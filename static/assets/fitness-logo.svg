<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 74" width="210" height="74">
  <!-- Transparent background — composites over the app's dark #0e0e1a -->
  <!-- Inter loaded via page <head>; @import blocked in img context -->
  <!-- "Fitness" — Inter Bold, off-white matching app's --text variable -->
  <text x="0" y="44" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-weight="700" font-size="38" fill="#f0f0f5" letter-spacing="0.5">Fitness<tspan fill="#22c55e">.</tspan></text>
  <!-- Green accent rule — uses app's own success green, bridges CAS brand -->
  <line x1="0" y1="53" x2="140" y2="53" stroke="#22c55e" stroke-width="1.5"/>
  <!-- CAS. Consulting subscript -->
  <text x="0" y="68" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
    <tspan font-weight="900" font-size="12" fill="#22c55e">CAS.</tspan>
    <tspan font-weight="300" font-size="10" fill="#7878a0" letter-spacing="4" dx="5">CONSULTING</tspan>
  </text>
</svg>
